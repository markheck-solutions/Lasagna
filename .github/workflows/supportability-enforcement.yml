name: Supportability Enforcement

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  baseline-supportability:
    name: Baseline Protected Supportability Gate
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    uses: markheck-solutions/governance/.github/workflows/supportability-gate.yml@f3a6260871841f4ee7130da0cce4718bd3660978
    with:
      target-repository: ${{ github.repository }}
      target-repository-url: https://github.com/${{ github.repository }}.git
      target-base-sha: ${{ github.event.pull_request.base.sha }}
      target-head-sha: ${{ github.event.pull_request.head.sha }}
      target-pr-number: ${{ github.event.pull_request.number }}
      target-pr-url: ${{ github.event.pull_request.html_url }}
      governance-ref: f3a6260871841f4ee7130da0cce4718bd3660978
      artifact-name: baseline-supportability-gate-evidence

  candidate-supportability:
    name: Candidate Supportability Gate
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    uses: markheck-solutions/governance/.github/workflows/supportability-gate.yml@f3a6260871841f4ee7130da0cce4718bd3660978
    with:
      target-repository: ${{ github.repository }}
      target-repository-url: https://github.com/${{ github.repository }}.git
      target-base-sha: ${{ github.event.pull_request.base.sha }}
      target-head-sha: ${{ github.event.pull_request.head.sha }}
      target-pr-number: ${{ github.event.pull_request.number }}
      target-pr-url: ${{ github.event.pull_request.html_url }}
      governance-ref: f3a6260871841f4ee7130da0cce4718bd3660978
      artifact-name: candidate-supportability-gate-evidence

  delivery-receipt:
    name: Baseline Protected Delivery Receipt
    needs:
      - baseline-supportability
      - candidate-supportability
    if: ${{ always() && github.event.pull_request.base.ref == 'main' }}
    uses: markheck-solutions/governance/.github/workflows/delivery-receipt.yml@f3a6260871841f4ee7130da0cce4718bd3660978
    with:
      target-repository: ${{ github.repository }}
      target-repository-url: https://github.com/${{ github.repository }}.git
      target-base-sha: ${{ github.event.pull_request.base.sha }}
      target-head-sha: ${{ github.event.pull_request.head.sha }}
      target-pr-number: ${{ github.event.pull_request.number }}
      target-pr-url: ${{ github.event.pull_request.html_url }}
      governance-ref: f3a6260871841f4ee7130da0cce4718bd3660978
      supportability-artifact-name: baseline-supportability-gate-evidence
      supportability-artifact-id: ${{ needs['baseline-supportability'].outputs['artifact-id'] || 'missing-baseline-supportability-artifact-id' }}
      supportability-artifact-digest: ${{ needs['baseline-supportability'].outputs['artifact-digest'] || 'missing-baseline-supportability-artifact-digest' }}
      candidate-supportability-artifact-name: candidate-supportability-gate-evidence
      candidate-supportability-artifact-id: ${{ needs['candidate-supportability'].outputs['artifact-id'] || 'missing-candidate-supportability-artifact-id' }}
      candidate-supportability-artifact-digest: ${{ needs['candidate-supportability'].outputs['artifact-digest'] || 'missing-candidate-supportability-artifact-digest' }}
